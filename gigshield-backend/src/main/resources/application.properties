# ========================
# GigShield AI — Backend Configuration
# ========================

# Server
server.port=8081

# Request Size Limits (10MB max)
server.tomcat.max-http-form-post-size=10MB
server.tomcat.max-swallow-size=10MB
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Response Compression (gzip)
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain
server.compression.min-response-size=1024

# PostgreSQL Database
spring.datasource.url=jdbc:postgresql://localhost:5432/gigshield_db
spring.datasource.username=postgres
spring.datasource.password=SAKETH@0907r
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# HikariCP Connection Pool Tuning
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000

# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.info.title=GigShield AI API
springdoc.info.description=Enterprise Insurance Platform for Gig Workers
springdoc.info.version=1.0.0

# Spring Boot Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.info.env.enabled=true
info.app.name=GigShield AI
info.app.description=AI-Powered Insurance for Gig Workers
info.app.version=1.0.0

# AI Service URL
gigshield.ai.service.url=http://localhost:8000

# CORS Configuration
spring.web.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# JWT Configuration
jwt.secret=GigShieldAI-SuperSecretKey-2024-Enterprise-Platform-Security-Key-256bit
jwt.access-token.expiration=900000
jwt.refresh-token.expiration=604800000

# Rate Limiting
rate.limit.authenticated=100
rate.limit.public=30
rate.limit.window.seconds=60

# API Key for external services
gigshield.api-key=gigshield-api-key-2024-secure

# Async Processing
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=25

# Logging
logging.level.com.gigshield=DEBUG
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Email SMTP Setup for OTPs
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=sriramsakethsurubhotla.2006@gmail.com
# Use the App Password generated by the user
spring.mail.password=rfhq hvvq ecbd pfzs
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Cache (use simple in-memory when Redis is not available)
spring.cache.type=simple
spring.data.redis.repositories.enabled=false

# SQL Initialisation (data.sql seed)
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true
spring.jpa.defer-datasource-initialization=true
